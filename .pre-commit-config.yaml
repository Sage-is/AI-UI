# =============================================================================
# Pre-commit Git Hooks — Fast Developer Feedback
# =============================================================================
# These hooks run automatically on every `git commit` via the pre-commit
# framework (https://pre-commit.com). They catch common issues BEFORE code
# reaches the repo.
#
# IMPORTANT: These are a developer convenience, NOT a security boundary.
# Hooks run client-side and can be bypassed with --no-verify.
# The authoritative security gate is: make scan
#
# Setup:   make install_dev          (installs tools + wires hooks)
# Manual:  pre-commit run --all-files (run all hooks on all files)
# Update:  pre-commit autoupdate     (bump hook versions)
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # Secrets Detection — catch accidentally committed keys/tokens
  # ---------------------------------------------------------------------------
  # Gitleaks is a single Go binary. Fully local, zero network calls.
  # Config: .gitleaks.toml (project-specific allowlists)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # Python Security — catch common security bugs in backend code
  # ---------------------------------------------------------------------------
  # Bandit checks Python AST for security anti-patterns.
  # Config: .bandit.yaml (skipped rules, excluded dirs)
  # Only runs on backend Python files (not frontend, not migrations).
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", ".bandit.yaml", "-ll"]
        files: ^app/backend/

  # ---------------------------------------------------------------------------
  # Spell Checking — catch typos in code and comments
  # ---------------------------------------------------------------------------
  # Uses existing [tool.codespell] config in app/pyproject.toml.
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: '(\.svg|bun\.lock|\.lock|\.css|.*-bundle\.js|emoji-shortcodes.*\.json|i18n/locales/)'
        args: ["--ignore-words-list", "ans,whats"]
        additional_dependencies:
          - tomli  # needed for pyproject.toml config reading

  # ---------------------------------------------------------------------------
  # Basic Hygiene — zero-cost safety nets
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Catch leftover merge conflict markers (<<<<<<, ======, >>>>>>)
      - id: check-merge-conflict

      # Prevent committing large binary files by accident (>500KB)
      - id: check-added-large-files
        args: ["--maxkb=500"]

      # Normalize trailing whitespace
      - id: trailing-whitespace
        exclude: ^app/node_modules/

  # ---------------------------------------------------------------------------
  # Outreach Privacy — block private drafts from leaking into the public repo
  # ---------------------------------------------------------------------------
  # docs/outreach/ holds pre-send drafts that name prospects, schools, and
  # pricing. The .gitignore handles plain `git add`. This hook is the second
  # line: it refuses commits that include anything from that folder other
  # than README.md, catching `git add -f` (which bypasses .gitignore).
  - repo: local
    hooks:
      - id: block-outreach-drafts
        name: block outreach drafts (privacy poka-yoke)
        entry: bash -c 'echo "" >&2; echo "[ABORT] Outreach draft(s) staged for commit:" >&2; for f in "$@"; do echo "  - $f" >&2; done; echo "" >&2; echo "docs/outreach/ is private. Only README.md is tracked." >&2; echo "Drafts name real prospects — they must not enter the public repo." >&2; echo "If you genuinely need to commit one, edit .gitignore and this hook first." >&2; exit 1' --
        language: system
        files: ^docs/outreach/
        exclude: ^docs/outreach/README\.md$
        pass_filenames: true
        stages: [pre-commit]

  # ---------------------------------------------------------------------------
  # Dependency Audit — catch known CVEs in lockfiles before commit
  # ---------------------------------------------------------------------------
  # Runs Trivy against lockfiles when they change.
  # Trivy is installed via `make install_dev`. Fully local, uses cached DB.
  # This is a convenience check — the authoritative gate is: make scan_deps
  - repo: local
    hooks:
      - id: audit-deps
        name: audit-deps (trivy lockfile scan)
        entry: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1
        language: system
        files: (bun\.lock|requirements\.txt)$
        pass_filenames: true
        stages: [pre-commit]
