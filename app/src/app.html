<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<link rel="icon" type="image/png" href="/static/icons/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/static/icons/favicon.svg" />
	<link rel="shortcut icon" href="/static/icons/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png" />
	<meta name="apple-mobile-web-app-title" content="Sage.is AI" />

	<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
	<meta name="theme-color" content="#171717" />
	<meta name="robots" content="index, follow" />
	<meta name="description" content="Sage.is AI" />
	<link rel="search" type="application/opensearchdescription+xml" title="Sage.is AI UI" href="/opensearch.xml" />
	<link rel="stylesheet" href="https://startr.style/style.css" />
	<link rel="stylesheet" href="/assets/custom.css" />

	<script src="/assets/loader.js" defer></script>
	<script>
		function resizeIframe(obj) {
			obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
		}
	</script>

	<script>
		// Theme bootstrap — runs inline in <head> to prevent FOUC.
		// Sets both .dark/.light class (for Tailwind) AND data-theme attribute
		// (for Startr.Style semantic color system: --primary, --background, --text-main, etc.)
		(() => {
			const metaThemeColorTag = document.querySelector('meta[name="theme-color"]');
			const prefersDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

			if (!localStorage?.theme) {
				localStorage.theme = 'light';
			}

			// Helper: apply theme class + data-theme attribute in one place
			const setTheme = (mode) => {
				const isDark = mode === 'dark';
				document.documentElement.classList.add(isDark ? 'dark' : 'light');
				document.documentElement.classList.remove(isDark ? 'light' : 'dark');
				// Startr.Style uses [data-theme="dark"] to flip semantic colors
				document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
				metaThemeColorTag.setAttribute('content', isDark ? '#171717' : '#ffffff');
			};

			// Resolve theme preference
			const theme = localStorage.theme;
			if (theme === 'system') {
				setTheme(prefersDarkTheme ? 'dark' : 'light');
			} else if (theme === 'oled-dark') {
				setTheme('dark');
				// OLED: push grays to true black for AMOLED screens
				document.documentElement.style.setProperty('--color-gray-800', '#101010');
				document.documentElement.style.setProperty('--color-gray-850', '#050505');
				document.documentElement.style.setProperty('--color-gray-900', '#000000');
				document.documentElement.style.setProperty('--color-gray-950', '#000000');
				metaThemeColorTag.setAttribute('content', '#000000');
			} else if (theme === 'light') {
				setTheme('light');
			} else {
				// Default fallback: dark
				setTheme('dark');
			}

			// Listen for OS theme changes when in "system" mode
			window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
				if (localStorage.theme === 'system') {
					setTheme(e.matches ? 'dark' : 'light');
				}
			});

			// Splash screen logo (light/dark variant)
			const isDarkMode = document.documentElement.classList.contains('dark');
			const logo = document.createElement('img');
			logo.id = 'logo';
			logo.style =
				'position: absolute; width: auto; height: 6rem; top: 44%; left: 50%; transform: translateX(-50%); display:block;';
			logo.src = isDarkMode ? '/static/icons/splash-dark.png' : '/static/icons/splash.png';

			document.addEventListener('DOMContentLoaded', function () {
				const splash = document.getElementById('splash-screen');
				if (splash) splash.prepend(logo);
			});
		})();
	</script>

	<title>Sage.is AI</title>

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>

	<div id="splash-screen" style="position: fixed; z-index: 100; top: 0; left: 0; width: 100%; height: 100%">
		<style type="text/css" nonce="">
			html {
				overflow-y: scroll !important;
			}
		</style>

		<!-- Splash logo is injected dynamically by the theme bootstrap script above -->
	</div>
</body>

</html>

<style type="text/css" nonce="">
	html {
		overflow-y: hidden !important;
	}

	/* Splash screen backgrounds — uses Startr.Style semantic vars once loaded,
	   but needs hardcoded fallbacks here since this runs before CSS loads */
	#splash-screen {
		background: #fff;
	}

	html.dark #splash-screen {
		background: #000;
	}
</style>
